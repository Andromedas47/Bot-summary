name: finalize-slip-batches

on:
  schedule:
    - cron: "2-57/5 * * * *"
  workflow_dispatch:

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Call finalize-slip-batches cron
        run: |
          curl -sf --max-time 30 \
            -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://bot-summary.vercel.app/api/cron/finalize-slip-batches